<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Party Birthday Wishes</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        color: #24222b;
        font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 10%, rgba(255,255,255,.9), transparent 26%),
          linear-gradient(90deg, rgba(160,170,180,.08) 1px, transparent 1px) 0 0 / 46px 46px,
          linear-gradient(0deg, rgba(160,170,180,.08) 1px, transparent 1px) 0 0 / 42px 42px,
          #f4f4f4;
      }
      .page { width: min(100% - 28px, 1180px); margin: 0 auto; padding: 34px 0 70px; overflow: hidden; }
      header { display: flex; justify-content: space-between; align-items: center; gap: 18px; min-height: 50px; font-weight: 900; }
      a { color: inherit; }
      nav { display: flex; gap: 18px; color: #667085; }
      nav a { text-decoration: none; }
      .hero { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 34px; align-items: center; padding: 34px 0; }
      .scene { position: relative; min-height: 720px; display: grid; align-items: center; }
      .envelope {
        position: absolute; right: 0; top: 70px; width: 450px; height: 560px;
        background: #f8f8f5; box-shadow: 0 26px 54px rgba(70,74,82,.18); overflow: hidden;
        clip-path: polygon(50% 0, 100% 34%, 100% 100%, 0 100%, 0 34%);
      }
      .envelope:before {
        content: ""; position: absolute; inset: 84px 0 auto; height: 230px;
        background: repeating-linear-gradient(0deg, #0daee8 0 24px, #fff 24px 52px);
        opacity: .95;
      }
      .envelope:after {
        content: ""; position: absolute; inset: auto 0 0; height: 48%;
        background: linear-gradient(135deg, transparent 50%, rgba(210,210,210,.55) 51%), linear-gradient(225deg, transparent 50%, rgba(255,255,255,.86) 51%), #f8f8f5;
      }
      .card {
        position: relative; z-index: 2; width: min(100%, 860px); min-height: 620px; padding: 54px 48px 42px;
        text-align: center; background: #fff6a8; box-shadow: 0 28px 44px rgba(55,60,68,.25);
        overflow: hidden;
      }
      .card:before {
        content: ""; position: absolute; inset: 0; opacity: .18; pointer-events: none;
        background: radial-gradient(circle at 20% 20%, #fff 0 1px, transparent 2px) 0 0 / 14px 14px;
      }
      .art { position: relative; width: min(100%, 690px); margin: 0 auto 26px; }
      .art img { display: block; width: 100%; height: auto; mix-blend-mode: multiply; }
      [contenteditable] { outline: none; border-radius: 8px; }
      [contenteditable]:focus { background: rgba(255,255,255,.62); box-shadow: 0 0 0 3px rgba(13,174,232,.16); }
      h1 {
        margin: 6px auto 6px; color: #222; font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 4.4vw, 58px); line-height: 1.03; letter-spacing: .08em; font-weight: 800;
      }
      .date { margin: 0; font-size: clamp(18px, 2.2vw, 28px); line-height: 1.45; letter-spacing: .04em; font-weight: 700; }
      .note { color: #555; margin-top: 10px; font-size: 15px; font-weight: 700; }
      .panel { align-self: end; padding: 22px; border-radius: 24px; background: rgba(255,255,255,.78); box-shadow: 0 20px 42px rgba(55,60,68,.13); }
      .panel h2 { margin: 0 0 10px; font-size: 24px; }
      .panel p { margin: 0; color: #667085; line-height: 1.7; font-weight: 700; }
      .wishes { display: grid; grid-template-columns: 390px minmax(0, 1fr); gap: 22px; padding-top: 16px; }
      form, .list { border-radius: 24px; background: rgba(255,255,255,.82); box-shadow: 0 18px 38px rgba(55,60,68,.10); }
      form { padding: 20px; display: grid; gap: 12px; align-content: start; }
      input, textarea, button {
        width: 100%; border: 1px solid rgba(36,34,43,.14); border-radius: 14px; padding: 13px 14px;
        font: inherit; font-weight: 700; background: #fff;
      }
      textarea { min-height: 116px; resize: vertical; }
      button { border: 0; color: #fff; background: #0daee8; cursor: pointer; font-weight: 900; }
      .list { padding: 20px; min-height: 280px; }
      .list h2 { margin: 0 0 14px; }
      .wish { padding: 14px 0; border-top: 1px solid rgba(36,34,43,.10); }
      .wish:first-of-type { border-top: 0; }
      .wish strong { display: block; margin-bottom: 6px; }
      .wish p { margin: 0; color: #475467; line-height: 1.65; font-weight: 650; white-space: pre-wrap; }
      .empty { color: #667085; font-weight: 700; }
      @media (max-width: 900px) {
        nav { display: none; }
        .hero, .wishes { grid-template-columns: 1fr; }
        .scene { min-height: auto; }
        .envelope { right: -80px; top: 80px; width: 310px; height: 420px; opacity: .75; }
        .card { min-height: 520px; padding: 36px 22px 32px; }
        .panel { align-self: auto; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <a href="../" style="text-decoration:none">Party Birthday Card</a>
        <nav><a href="#wishes">祝福区</a><a href="../card5/">Card 5</a><a href="../">首页</a></nav>
      </header>

      <section class="hero">
        <div class="scene">
          <div class="envelope" aria-hidden="true"></div>
          <article class="card">
            <div class="art"><img src="./assets/party-characters.png" alt="生日派对插画"></div>
            <h1 contenteditable="true">BIRTHDAY PARTY</h1>
            <p class="date" contenteditable="true">July 4th at 5pm<br>Our home</p>
            <p class="note" contenteditable="true">Cake, candles and happy wishes will be served.</p>
          </article>
        </div>
        <aside class="panel">
          <h2>给朋友发祝福</h2>
          <p>下面是共享祝福区。别人打开同一个公网链接，也能看到大家写下的祝福。</p>
        </aside>
      </section>

      <section id="wishes" class="wishes">
        <form id="wishForm">
          <input id="name" maxlength="40" placeholder="你的名字" required>
          <textarea id="message" maxlength="500" placeholder="写一句生日祝福..." required></textarea>
          <button type="submit">发送祝福</button>
        </form>
        <div class="list">
          <h2>祝福留言</h2>
          <div id="wishList" class="empty">正在读取...</div>
        </div>
      </section>
    </main>

    <script>
      const list = document.getElementById('wishList');
      const form = document.getElementById('wishForm');

      async function loadWishes() {
        const res = await fetch('/api/wishes');
        const data = await res.json();
        if (!data.length) {
          list.className = 'empty';
          list.textContent = '还没有祝福，做第一个留言的人。';
          return;
        }
        list.className = '';
        list.innerHTML = data.map(w => `
          <article class=\"wish\">
            <strong>${escapeHtml(w.name)}</strong>
            <p>${escapeHtml(w.message)}</p>
          </article>
        `).join('');
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const message = document.getElementById('message').value.trim();
        if (!name || !message) return;
        await fetch('/api/wishes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, message })
        });
        form.reset();
        await loadWishes();
      });

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, ch => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[ch]));
      }

      setTimeout(loadWishes, 0);
      window.addEventListener('focus', loadWishes);
      loadWishes().catch(() => {
        list.className = 'empty';
        list.textContent = '本地直接打开文件时不能使用共享数据库，请通过 Node 服务或 Zeabur 访问。';
      });
    </script>
  </body>
</html>
