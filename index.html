<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生日礼物</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #5e6876;
        --paper: #fffdf7;
        --rose: #e85d75;
        --teal: #1c9a94;
        --sun: #f5b642;
        --violet: #7657c6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 14%, rgba(232, 93, 117, 0.22), transparent 30%),
          radial-gradient(circle at 88% 8%, rgba(28, 154, 148, 0.18), transparent 28%),
          linear-gradient(135deg, #fffdf7 0%, #eef8f6 48%, #fff5e8 100%);
        overflow-x: hidden;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      .stage {
        width: min(1120px, 100%);
        min-height: min(720px, calc(100vh - 64px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
        align-items: stretch;
        gap: 28px;
      }

      .hero {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(28px, 5vw, 64px);
        border: 1px solid rgba(24, 33, 47, 0.1);
        border-radius: 28px;
        background:
          linear-gradient(140deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.38)),
          url("data:image/svg+xml,%3Csvg width='900' height='700' viewBox='0 0 900 700' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%2318212f' stroke-opacity='.08'%3E%3Cpath d='M120 590C210 380 365 295 585 335c105 19 163-42 195-142'/%3E%3Cpath d='M55 190c180 95 342 96 486 3 76-49 158-61 246-36'/%3E%3C/g%3E%3Cg%3E%3Ccircle cx='710' cy='120' r='86' fill='%23f5b642' fill-opacity='.34'/%3E%3Ccircle cx='180' cy='520' r='118' fill='%231c9a94' fill-opacity='.18'/%3E%3Ccircle cx='470' cy='430' r='70' fill='%23e85d75' fill-opacity='.2'/%3E%3C/g%3E%3C/svg%3E");
        background-size: cover;
        box-shadow: 0 24px 80px rgba(24, 33, 47, 0.12);
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto 42px 38px auto;
        width: 170px;
        aspect-ratio: 1;
        background:
          conic-gradient(from 18deg, var(--rose), var(--sun), var(--teal), var(--violet), var(--rose));
        border-radius: 50%;
        filter: saturate(1.1);
        opacity: 0.9;
        mask: radial-gradient(circle, transparent 35%, #000 36%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        width: max-content;
        gap: 10px;
        padding: 8px 12px;
        border: 1px solid rgba(24, 33, 47, 0.12);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.58);
        font-size: 13px;
        font-weight: 700;
      }

      .spark {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--rose);
        box-shadow: 18px 0 0 var(--sun), 36px 0 0 var(--teal);
      }

      h1 {
        max-width: 760px;
        margin: 72px 0 22px;
        font-family: "Noto Serif SC", serif;
        font-size: clamp(52px, 9vw, 112px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .lead {
        max-width: 650px;
        margin: 0;
        color: #354153;
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.65;
      }

      .hero-footer {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 14px;
        margin-top: 64px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        border: 0;
        color: white;
        background: #18212f;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 14px 30px rgba(24, 33, 47, 0.22);
      }

      .date {
        color: var(--muted);
        font-weight: 700;
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        padding: 22px;
        border: 1px solid rgba(24, 33, 47, 0.1);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 24px 70px rgba(24, 33, 47, 0.1);
        backdrop-filter: blur(20px);
      }

      .gift {
        min-height: 260px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background:
          linear-gradient(160deg, rgba(24, 33, 47, 0.95), rgba(54, 67, 91, 0.9)),
          radial-gradient(circle at 30% 20%, rgba(245, 182, 66, 0.6), transparent 35%);
        color: white;
        position: relative;
        overflow: hidden;
      }

      .gift::before,
      .gift::after {
        content: "";
        position: absolute;
        background: rgba(245, 182, 66, 0.9);
      }

      .gift::before {
        width: 42px;
        inset: 0 auto 0 50%;
        transform: translateX(-50%);
      }

      .gift::after {
        height: 42px;
        inset: 50% 0 auto;
        transform: translateY(-50%);
      }

      .gift-mark {
        position: relative;
        z-index: 1;
        width: 154px;
        height: 154px;
        border: 8px solid white;
        border-radius: 32px;
        display: grid;
        place-items: center;
        font-size: 64px;
        font-family: "Noto Serif SC", serif;
        background: rgba(232, 93, 117, 0.88);
        transform: rotate(-6deg);
      }

      .note {
        display: grid;
        gap: 12px;
      }

      .note h2 {
        margin: 0;
        font-family: "Noto Serif SC", serif;
        font-size: 28px;
      }

      .note p {
        margin: 0;
        color: var(--muted);
        line-height: 1.75;
      }

      .wishes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .wish {
        min-height: 86px;
        padding: 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid rgba(24, 33, 47, 0.08);
        font-weight: 800;
      }

      .wish span {
        display: block;
        margin-bottom: 8px;
        color: var(--teal);
        font-size: 13px;
      }

      @media (max-width: 860px) {
        .stage {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .hero,
        .panel {
          border-radius: 22px;
        }

        .hero::after {
          width: 118px;
          right: 22px;
          bottom: 24px;
        }

        h1 {
          margin-top: 54px;
        }
      }

      @media (max-width: 520px) {
        .page {
          padding: 14px;
        }

        .hero,
        .panel {
          padding: 20px;
        }

        .wishes {
          grid-template-columns: 1fr;
        }

        .hero-footer {
          margin-top: 42px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="stage" aria-label="生日礼物主页">
        <div class="hero">
          <div>
            <div class="eyebrow"><span class="spark"></span> Birthday Gift Website</div>
            <h1>生日快乐</h1>
            <p class="lead">
              愿今天的每一束光、每一份笑意、每一句祝福，都悄悄变成未来一年里的好运。
            </p>
          </div>
          <div class="hero-footer">
            <a class="button" href="#gift">打开礼物</a>
            <span class="date">为重要的人准备的一页小惊喜</span>
          </div>
        </div>

        <aside class="panel" id="gift">
          <div class="gift" aria-hidden="true">
            <div class="gift-mark">礼</div>
          </div>
          <div class="note">
            <h2>把祝福放进网页里</h2>
            <p>
              这是一个可以继续定制的生日网页：你可以替换姓名、照片、日期和留言，也可以直接把它当作一个简洁漂亮的线上生日卡片。
            </p>
          </div>
          <div class="wishes">
            <div class="wish"><span>01</span>开心常在</div>
            <div class="wish"><span>02</span>万事顺意</div>
            <div class="wish"><span>03</span>心愿成真</div>
            <div class="wish"><span>04</span>被爱包围</div>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
